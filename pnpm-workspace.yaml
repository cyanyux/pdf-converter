packages:
  - apps/*
  - packages/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ~6.0.3
  "@typescript/native-preview": latest
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
