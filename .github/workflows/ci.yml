name: CI

on:
  push:
  pull_request:

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Installs the `vp` CLI (version auto-resolved from the pinned `vite-plus`
      # catalog entry), provisions Node from .node-version, caches deps, runs install.
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true
          run-install: true
      - name: Format + lint + type-check (Vite+)
        run: vp check
      - name: Tests (Vitest)
        run: vp run -r test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv venv --python 3.12 worker/.venv
      # Worker unit tests are GPU-free: no paddle / pymupdf needed.
      - name: Install worker test deps
        run: uv pip install --python worker/.venv ruff==0.15.20 pytest==9.1.1 beautifulsoup4==4.15.0
      - name: Lint + format check
        run: |
          worker/.venv/bin/ruff check worker/src worker/tests
          worker/.venv/bin/ruff format --check worker/src worker/tests
      - name: pytest (unit; no GPU)
        run: cd worker && PYTHONPATH=src .venv/bin/pytest
