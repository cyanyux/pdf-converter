services:
  pdf-ocr:
    build: .
    container_name: pdf-ocr
    runtime: nvidia
    init: true
    restart: unless-stopped
    stop_grace_period: 90s
    ports:
      - "5000:5000"
    volumes:
      - pdf-ocr-data:/app/data # jobs db + uploads + outputs
      - pdf-ocr-paddlex:/root/.paddlex # model weights cache
      - pdf-ocr-cache:/root/.cache
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Recommended when exposed: require an API key on the REST API + MCP.
      # API_KEY: "change-me"
      # PDF_OCR_DEVICE: gpu:0   # or "cpu"
    networks:
      - app-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  pdf-ocr-data:
  pdf-ocr-paddlex:
  pdf-ocr-cache:

networks:
  app-net:
    external: true
